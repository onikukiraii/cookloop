services:
  frontend:
    build:
      context: ./frontend
      dockerfile: docker/Dockerfile.prod
    ports:
      - 80:80
    depends_on:
      - api
    restart: always

  api:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-app}:${MYSQL_PASSWORD}@db:3306/${MYSQL_DATABASE:-cookloop}
      OPENSEARCH_URL: http://opensearch:9200
    command: ["uv", "run", "fastapi", "run", "--host", "0.0.0.0", "--port", "8000"]
    depends_on:
      - db
      - opensearch
    restart: always

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER:-app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-cookloop}
    volumes:
      - mysql-data:/var/lib/mysql
    restart: always

  opensearch:
    build:
      context: ./infra/opensearch
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - DISABLE_INSTALL_DEMO_CONFIG=true
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    restart: always

volumes:
  mysql-data:
  opensearch-data:
