services:
  frontend:
    build:
      context: ./frontend
      dockerfile: docker/Dockerfile
    ports:
      - 5173:5173
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api

  api:
    build:
      context: .
      dockerfile: backend/docker/Dockerfile
    ports:
      - 8000:8000
    volumes:
      - ./backend:/app
      - /app/.venv
      - ./scripts:/scripts
    env_file:
      - .env
    environment:
      DATABASE_URL: mysql+pymysql://app:password@db:3306/cookloop
      OPENSEARCH_URL: http://opensearch:9200
    command: ["uv", "run", "fastapi", "dev", "--host", "0.0.0.0", "--port", "8000"]
    depends_on:
      - db
      - opensearch
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_USER: app
      MYSQL_PASSWORD: password
      MYSQL_DATABASE: cookloop
    ports:
      - 3309:3306
    volumes:
      - mysql-data:/var/lib/mysql

  opensearch:
    build:
      context: ./infra/opensearch
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - DISABLE_INSTALL_DEMO_CONFIG=true
    ports:
      - 9205:9200
    volumes:
      - opensearch-data:/usr/share/opensearch/data

volumes:
  mysql-data:
  opensearch-data:

